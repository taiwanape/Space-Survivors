<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>星際突圍 Stellar Breakout</title>
<style>
* { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }
body, html { width: 100%; height: 100%; background: #020205; overflow: hidden; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; touch-action: none; }
#game-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; overflow: hidden; background: #020205; }
canvas { display: block; width: 100%; height: 100%; touch-action: none; }

.overlay, .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; }
.overlay { z-index: 5; pointer-events: none; }
.modal { background: #0a0202; background-image: radial-gradient(circle at center, #0f0a1c 0%, #000 100%); pointer-events: auto; }
.hidden { display: none !important; }
button { outline: none; border: none; cursor: pointer; pointer-events: auto; font-family: inherit; }

.top-exp-bar { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(0,0,0,0.8); z-index: 10; pointer-events: none; }
#exp-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc); background-size: 200% 100%; animation: expGlow 2s linear infinite; width: 0%; transition: width 0.2s linear; box-shadow: 0 0 12px #38bdf8;}
@keyframes expGlow { 0% {background-position: 100% 0;} 100% {background-position: -100% 0;} }

.hud-left { position: absolute; top: max(16px, env(safe-area-inset-top)); left: max(12px, env(safe-area-inset-left)); z-index: 9; display: flex; flex-direction: column; gap: 4px; width: 35%; max-width: 180px; }
.inv-row { display: flex; gap: 2px; width: 100%; }
.weapon-slot { flex: 1; aspect-ratio: 1 / 1; max-width: 28px; background: rgba(15,23,42,0.8); border: 1px solid #334155; display: flex; justify-content: center; align-items: center; font-size: clamp(12px, 3vw, 18px); position: relative; border-radius: 4px; color: #94a3b8; }
.weapon-slot.empty { border-color: rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); }
.weapon-slot.passive { border-radius: 50%; }
.weapon-slot .lvl-badge { position: absolute; bottom: -3px; right: -3px; background: #0284c7; color: white; font-size: 9px; font-weight: bold; padding: 1px 3px; font-family: monospace; border-radius: 2px; line-height: 1; border: 1px solid #0c4a6e;}
.weapon-slot.evolved { border-color: #facc15; background: rgba(69,26,3,0.8); box-shadow: 0 0 8px rgba(250,204,21,0.4); color: #facc15; }

.hud-center { position: absolute; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); z-index: 9; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
.time-display { font-size: 26px; color: #fff; text-shadow: 2px 2px 0px #000; font-family: monospace; font-weight: 900; letter-spacing: 2px; }
.time-display.boss { color: #f87171; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

#combo-display { margin-top: 5px; opacity: 0; transition: opacity 0.2s; text-align: center; transform: scale(0.9); }
#combo-display.active { opacity: 1; animation: comboPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.combo-text { font-size: 22px; font-weight: 900; color: #facc15; font-style: italic; text-shadow: 2px 2px 0 #9a3412, 0 0 10px rgba(250,204,21,0.5); letter-spacing: 1px; }
.combo-multiplier { font-size: 14px; color: #38bdf8; font-weight: bold; text-shadow: 1px 1px 0 #000; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 10px; margin-top: 2px; display: inline-block;}
@keyframes comboPop { 0% { transform: scale(0.5); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

.hud-right { position: absolute; top: max(16px, env(safe-area-inset-top)); right: max(12px, env(safe-area-inset-right)); z-index: 9; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.stats-text { font-size: 13px; font-weight: bold; text-shadow: 1px 1px 0 #000; font-family: monospace; display: flex; align-items: center; justify-content: flex-end; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1;}
.stats-icon { margin-right: 4px; display: inline-flex; align-items: center; justify-content: center; }
.stats-val { display: inline-block; min-width: 25px; text-align: right; }

#pause-btn-ingame, #dev-boss-btn { background: rgba(15,23,42,0.8); border: 1px solid #475569; color: #cbd5e1; font-size: 11px; border-radius: 6px; padding: 5px 10px; display: flex; align-items: center; gap: 4px; margin-top: 4px; font-weight: bold; cursor: pointer; pointer-events: auto; transition: background 0.2s;}
#pause-btn-ingame:active, #dev-boss-btn:active { background: #334155; }
#dev-boss-btn { background: rgba(136, 19, 55, 0.8); border-color: #f43f5e; color: #fecdd3;}

#dash-btn { position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); right: max(30px, env(safe-area-inset-right)); background: rgba(56, 189, 248, 0.2); border: 2px solid #38bdf8; color: #bae6fd; font-size: 15px; font-weight: 900; border-radius: 50%; width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; z-index: 10; flex-direction: column; line-height: 1.1; backdrop-filter: blur(4px); transition: transform 0.1s; box-shadow: 0 0 15px rgba(56,189,248,0.3); pointer-events: auto;}
#dash-btn:active { transform: scale(0.9); }
#dash-btn.cooldown { background: rgba(15, 23, 42, 0.8); border-color: #334155; color: #64748b; backdrop-filter: none; box-shadow: none; transform: none;}

#low-hp-vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 7; opacity: 0; background: radial-gradient(circle, transparent 40%, rgba(220, 38, 38, 0.4) 90%, rgba(153, 27, 27, 0.8) 100%); transition: opacity 0.3s ease; mix-blend-mode: multiply; }
#low-hp-vignette.danger { opacity: 1; animation: heartbeatVignette 1s infinite alternate ease-in-out; }
@keyframes heartbeatVignette { 0% { opacity: 0.5; } 100% { opacity: 1; transform: scale(1.02); } }

#radiation-warning { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(239,68,68,0) 50%, rgba(239,68,68,0.2) 100%); pointer-events: none; z-index: 8; display: none; justify-content: center; align-items: center; }

.center-layout { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; height: 100%; width: 100%; }
.mega-title { font-size: clamp(40px, 12vw, 80px); color: #facc15; text-shadow: 3px 3px 0 #9f1239; letter-spacing: 4px; font-weight: 900; margin: 0 0 10px 0; line-height: 1.1; }
.sub-title { font-size: clamp(16px, 5vw, 24px); color: #e2e8f0; letter-spacing: 12px; margin: 0 0 50px 0; font-weight: bold;}

.main-menu-btns { display: flex; flex-direction: column; width: 85%; max-width: 320px; gap: 16px; }
.btn-main { padding: 16px; font-size: 18px; color: #fff; border-radius: 8px; font-weight: 900; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); box-shadow: 0 4px 0 rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); width: 100%; letter-spacing: 4px; transition: filter 0.2s; cursor: pointer;}
.btn-main:active { transform: translateY(4px); box-shadow: none; filter: brightness(1.2); }
.btn-green-main { background: linear-gradient(180deg, #059669, #064e3b); }
.btn-blue-main { background: linear-gradient(180deg, #2563eb, #1e3a8a); }
.btn-brown-main { background: linear-gradient(180deg, #d97706, #78350f); }

.menu-coins-display { position: absolute; top: max(20px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); font-size: 20px; font-weight: 900; color: #facc15; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid #ca8a04; z-index: 100;}
.creator-text { position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); color: rgba(148,163,184,0.6); font-size: 12px; font-family: monospace; letter-spacing: 4px; z-index: 100; pointer-events: none; font-weight: bold; white-space: nowrap; text-shadow: 0 0 10px rgba(56,189,248,0.3); text-transform: uppercase; }
.version-text { position: absolute; top: max(20px, env(safe-area-inset-top)); left: max(20px, env(safe-area-inset-left)); color: rgba(255,255,255,0.4); font-size: 12px; font-family: monospace; z-index: 100; pointer-events: none; font-weight: bold;}

.blinking-text { font-size: 16px; color: #38bdf8; animation: blink 1.5s infinite; font-weight: bold; margin-top: 40px; letter-spacing: 2px;}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.modal-header { height: calc(65px + env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; padding: env(safe-area-inset-top) max(15px, env(safe-area-inset-right)) 0 max(15px, env(safe-area-inset-left)); background: #000; border-bottom: 2px solid #450a0a; flex-shrink: 0; z-index: 2;}
.modal-header .title { font-size: 20px; font-weight: 900; color: #f8fafc; letter-spacing: 2px; margin: 0; }
.icon-btn { background: #334155; border: 1px solid #475569; color: white; font-size: 14px; padding: 6px 14px; border-radius: 6px; box-shadow: 0 3px 0 #0f172a; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px;}

.modal-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px max(20px, env(safe-area-inset-right)) 20px max(20px, env(safe-area-inset-left)); z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 15px;}
.modal-footer { padding: 15px max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left)); display: flex; justify-content: center; align-items: center; background: #020617; border-top: 2px solid #1e293b; flex-shrink: 0; z-index: 2;}

.char-details-container { background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 12px; width: 100%; max-width: 500px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
.char-details-top { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1e293b;}
.char-sprite-large { font-size: 36px; width: 64px; height: 64px; background: #020617; border: 2px solid #38bdf8; display: flex; justify-content: center; align-items: center; border-radius: 12px; margin-right: 15px; flex-shrink: 0; color: #bae6fd;}
.char-info-text { flex: 1; min-width: 0; text-align: left; display: flex; flex-direction: column; gap: 6px;}
.char-info-text h2 { margin: 0; color: #f8fafc; font-size: 20px; font-weight: 900;}
.char-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.char-weapon-info { background: #1e293b; border: 1px solid #334155; padding: 3px 8px; border-radius: 6px; font-size: 11px; color: #cbd5e1; font-weight: bold;}
.char-info-text p { font-size: 12px; color: #94a3b8; }

.char-stats-grid { display: flex; flex-wrap: wrap; padding: 10px; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.5);}
.stat-item-row { width: 50%; padding: 6px 10px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);}
.stat-label { color: #cbd5e1; } .stat-value { color: #facc15; font-weight: bold;}
.char-grid-bottom { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; max-width: 500px; margin-top: 10px;}
.char-slot { background: #0f172a; border: 2px solid #334155; border-radius: 10px; width: 56px; height: 56px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 28px; color: #94a3b8;}
.char-slot.selected { border-color: #38bdf8; background: #0284c7; color: #fff; transform: scale(1.05);}

.list-card { background: rgba(15,23,42,0.95); border: 1px solid #334155; border-radius: 10px; padding: 14px; width: 100%; max-width: 480px; display: flex; align-items: center; text-align: left; margin-bottom: 10px; transition: transform 0.1s;}
.list-card.clickable { cursor: pointer; } .list-card.clickable:active { transform: scale(0.98); }
.card-icon-box { width: 46px; height: 46px; background: #020617; border: 1px solid #475569; border-radius: 8px; display: flex; justify-content: center; align-items: center; margin-right: 14px; flex-shrink: 0; font-size: 26px; color: #38bdf8;}
.card-content { flex: 1; min-width: 0; } 
.card-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap;}
.card-title-row h3 { margin: 0; font-size: 15px; color: #f8fafc; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;}
.card-tag { font-size: 10px; font-weight: bold; color: #fff; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; background: #475569;}
.card-tag.new { background: #d97706; color: #fef3c7; } .card-tag.evo-tag { background: #be123c; color: #ffe4e6;}
.card-desc { margin: 0; font-size: 12px; color: #94a3b8; line-height: 1.4;}
.btn-buy { padding: 8px 14px; font-size: 14px; background: linear-gradient(180deg, #059669, #064e3b); color: #fff; border: 1px solid #047857; border-radius: 6px; font-weight: 900; margin-left: 10px; cursor: pointer; display: flex; align-items: center; gap: 4px;}
.btn-buy:disabled { background: #1e293b; border-color: #334155; color: #64748b; cursor: not-allowed;}

.stage-card { flex-direction: column; align-items: flex-start; cursor: pointer; }
.stage-card.selected { border-color: #38bdf8; background: rgba(2,132,199,0.2);}
.stage-card.locked { opacity: 0.5; pointer-events: none; filter: grayscale(1); }

.popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 50; padding: 20px;}
.popup-box { width: 100%; max-width: 420px; display: flex; flex-direction: column; text-align: center; }
.popup-title { color: #38bdf8; margin: 0 0 15px; font-size: 28px; font-weight: 900; text-shadow: 0 0 10px rgba(56,189,248,0.5);}
.popup-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 10px; display: flex; flex-direction: column; gap: 8px;}
.popup-inner { background: rgba(15,23,42,0.95); border: 1px solid #334155; border-radius: 10px; padding: 18px; margin-bottom: 12px; box-shadow: 0 10px 25px #000;}

.chest-img { cursor: pointer; margin: 20px auto; display: flex; justify-content: center; align-items: center; font-size: 100px; filter: drop-shadow(0 0 15px rgba(250,204,21,0.5)); width: 100px; height: 100px; line-height: 1;}
.opening { animation: shake 0.3s infinite; pointer-events: none;}
@keyframes shake { 0%, 100% { transform: translate(2px, -2px) rotate(-3deg); } 50% { transform: translate(-2px, 2px) rotate(3deg); } }
@keyframes slideInFade { 0% { opacity: 0; transform: translateX(30px) scale(0.95); } 100% { opacity: 1; transform: translateX(0) scale(1); } }
.level-up-card-anim { opacity: 0; animation: slideInFade 0.2s ease-out forwards; }

#achievement-popup { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: rgba(2,6,23,0.95); border: 2px solid #facc15; border-radius: 30px; padding: 8px 20px; display: flex; align-items: center; z-index: 100; display: none; width: max-content; gap: 10px; box-shadow: 0 5px 20px rgba(250,204,21,0.3);}

@media (min-width: 768px) {
    .mega-title { font-size: 80px; } .sub-title { font-size: 24px; margin-bottom: 60px; } .btn-main { padding: 20px; font-size: 24px; }
    .modal-header { height: 70px; padding: 0 30px; } .modal-header .title { font-size: 24px; }
    .time-display { font-size: 36px; } .stats-text { font-size: 16px; } .weapon-slot { max-width: 40px; font-size: 18px; }
    .char-slot { width: 70px; height: 70px; font-size: 36px;} #dash-btn { width: 80px; height: 80px; font-size: 16px; }
}
</style>
</head>
<body>

<audio id="bgm-audio" loop preload="auto"><source src="https://labs.phaser.io/assets/audio/oedipus_ark_pandora.mp3" type="audio/mpeg"></audio>
<audio id="boss-bgm-audio" loop preload="auto"><source src="https://labs.phaser.io/assets/audio/Dafunk_-_Hardcore_Power_(We_Believe_In_Supremacy).mp3" type="audio/mpeg"></audio>

<div id="game-container">
    <div id="splash-screen" class="overlay center-layout" style="z-index:50; pointer-events:auto; background:#020205;" onclick="window.enterTitle()">
        <div class="version-text" style="color:#0ea5e9;">V65 終極雷達無盡修復版</div>
        <h1 class="mega-title">STELLAR<br>BREAKOUT</h1>
        <h2 class="sub-title">星際突圍</h2>
        <div class="blinking-text">點擊螢幕啟動系統</div>
        <div class="creator-text">Developed by Lin Xiaomu</div>
    </div>

    <div id="low-hp-vignette"></div>

    <div id="game-ui" class="overlay hidden">
        <div id="achievement-popup"><div class="stats-icon" style="font-size:20px">🏆</div><div><h4 style="margin: 0; color: #facc15; font-size: 10px;">成就解鎖</h4><p id="ach-popup-title" style="margin: 2px 0 0 0; color: #fff; font-size: 13px; font-weight: bold;">---</p></div></div>
        <div id="radiation-warning"><div class="blinking-text" style="font-size:24px;color:#fca5a5;text-shadow:0 0 10px red;">⚠️ 離開作戰區域 ⚠️</div></div>
        <div class="top-exp-bar"><div id="exp-fill"></div></div>
        
        <div class="hud-left"><div class="inv-row" id="weapon-row"></div><div class="inv-row" id="passive-row"></div></div>
        <div class="hud-center">
            <div class="time-display" id="time-display">00:00</div>
            <div id="combo-display">
                <div class="combo-text"><span id="combo-count">0</span> HITS!</div>
                <div class="combo-multiplier">加成 <span id="combo-mult-val">+0%</span></div>
            </div>
        </div>
        <div class="hud-right">
            <div class="stats-text"><span class="stats-icon">⭐</span>LV<span class="stats-val" id="level-display" style="color:#38bdf8;">1</span></div>
            <div class="stats-text" style="color:#facc15"><span class="stats-icon">🪙</span><span class="stats-val" id="ingame-coin-display">0</span></div>
            <div class="stats-text" style="color:#f87171"><span class="stats-icon">💀</span><span class="stats-val" id="score-display">0</span></div>
            <button id="pause-btn-ingame" onclick="window.togglePause()">⏸ 暫停</button>
            <button id="dev-boss-btn" onclick="window.devSpawnBoss()">👾 呼叫Boss</button>
        </div>
        <button id="dash-btn" onclick="window.triggerSkill()"><span>技能</span><br><span>準備</span></button>
    </div>

    <!-- 標題選單 -->
    <div id="title-screen" class="modal hidden center-layout">
        <div class="menu-coins-display" id="menu-coins-top"><span class="stats-icon">🪙</span> <span id="menu-coins">0</span></div>
        <h1 class="mega-title">STELLAR<br>BREAKOUT</h1>
        <h2 class="sub-title">星際突圍</h2>
        <div class="main-menu-btns">
            <button class="btn-main btn-green-main" onclick="window.goToCharSelect()">開始出擊</button>
            <button class="btn-main btn-blue-main" onclick="window.goToShop()">科技樹升級</button>
            <button class="btn-main btn-brown-main" onclick="window.goToAchievements()">作戰紀錄</button>
        </div>
    </div>

    <!-- 角色選擇選單 -->
    <div id="char-select-menu" class="modal hidden">
        <div class="modal-header"><button class="icon-btn" onclick="window.backToMainMenu()">BACK</button><div class="title">選擇駕駛員</div><div style="font-size:18px;font-weight:900;color:#facc15;display:flex;align-items:center;">🪙 <span id="char-menu-coins" style="margin-left:4px">0</span></div></div>
        <div class="modal-content"><div class="char-details-container"><div class="char-details-top"><div class="char-sprite-large" id="char-sprite-display"></div><div class="char-info-text"><h2 id="char-name">安東尼奧</h2><div class="char-badges"><div class="char-weapon-info">武裝: <span id="char-weapon" style="color:#facc15;">前鋒機砲</span></div><div class="char-weapon-info">技能: <span id="char-skill" style="color:#38bdf8;">空間摺疊</span></div></div><p id="char-desc">駕駛標準戰機。</p></div></div><div class="char-stats-grid" id="char-stats"></div></div><div class="char-grid-bottom" id="char-grid"></div></div>
        <div class="modal-footer"><button class="btn-main btn-green-main" style="max-width:400px;width:100%" onclick="window.goToStageSelect()">確認</button></div>
    </div>
    
    <!-- 關卡選擇選單 -->
    <div id="stage-select-menu" class="modal hidden">
        <div class="modal-header"><button class="icon-btn" onclick="window.goToCharSelect()">BACK</button><div class="title">選擇星域</div><div style="width:64px;"></div></div>
        <div class="modal-content" style="align-items: stretch;">
            <label style="background: rgba(15,23,42,0.9); padding: 15px; border-radius: 8px; border: 1px solid #38bdf8; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer; color: #fff; font-weight: bold;">
                <input type="checkbox" id="endless-toggle" style="width: 20px; height: 20px;"> 開啟無盡模式 (無 Boss，無時間上限)
            </label>
            <div id="stage-list" style="display:flex;flex-direction:column;gap:10px;align-items:center;"></div>
        </div>
        <div class="modal-footer"><button class="btn-main btn-green-main" style="max-width:400px;width:100%" onclick="window.startGame()">部署並空降</button></div>
    </div>

        if(isNaN(dx)||isNaN(dy)) return {x:1,y:0,d:0}; let d=HYPOT(dx,dy); if(d<0.0001) return {x:1,y:0,d:0}; return {x:dx/d, y:dy/d, d:d};

    }

            player.maxHp+=2; player.hp=player.maxHp; pendingLvl++; lvled=true;
        } 
        if(lvled) { safeUpdate('level-display',player.level); spawnParticles(worldX,worldY,'#facc15',50); screenShake = Math.max(screenShake, 20); enemies.forEach(e=>{if(distSq(worldX,worldY,e.x,e.y)<22500&&!e.isB&&e.t!=='el'&&e.t!=='tn')e.dead=true;}); }

    function queueEnemyBatch() { 
        if(enemies.length > 200 || bossSpawned) return; 
        let count = 15 + Math.floor(gameSeconds/5)*5; if(gameSeconds % 60 >= 45) count *= 2; 
        if (spawnQueue > 200) spawnQueue = 200; spawnQueue += count; 
    }

    function processSpawnQueue() {
        if (spawnQueue <= 0 || enemies.length >= 250) return; 
        let stf = Math.min(spawnQueue, 5); 
        let wm = Math.floor(gameSeconds/30); let hpSc = 1 + wm*0.8 + Math.pow(wm,2)*0.4;
        let isS = (gameSeconds%60>=45); let radB = Math.max(canvas.width, canvas.height)/2 + 50;

        for(let i=0; i<stf; i++) {
            let ty='mn'; if(wm>=1&&Math.random()<0.15)ty='sp'; if(wm>=3&&Math.random()<0.2+(wm*0.03))ty='tn'; if(wm>=4&&Math.random()<0.1)ty='ch'; 
            let sz,sp,hp,col,kbR, spSc=1+wm*0.05;
            if(ty==='tn'){sz=25+Math.random()*5;sp=0.6*spSc;hp=80*hpSc;col='#4c1d95';kbR=0.15;} else if(ty==='ch'){sz=15+Math.random()*3;sp=2.5*spSc;hp=15*hpSc;col='#fbbf24';kbR=0.5;} else if(ty==='sp'){sz=18+Math.random()*4;sp=1.4*spSc;hp=15*hpSc;col='#ea580c';kbR=0.7;} else{sz=12+Math.random()*3;sp=(isS?1.8:1.1)*spSc+Math.random()*0.3;hp=(isS?4:8)*hpSc;col=isS?'#3b82f6':'#1e293b';kbR=0.9;}
            let a=Math.random()*Math.PI*2, sx,sy;
            if(isS){ let side=Math.floor(gameSeconds/5)%4; if(side===0){sx=worldX+(Math.random()-0.5)*canvas.width;sy=worldY-radB;} else if(side===1){sx=worldX+radB;sy=worldY+(Math.random()-0.5)*canvas.height;} else if(side===2){sx=worldX+(Math.random()-0.5)*canvas.width;sy=worldY+radB;} else {sx=worldX-radB;sy=worldY+(Math.random()-0.5)*canvas.height;} }
            else { let dR=radB+Math.random()*200; sx=worldX+Math.cos(a)*dR; sy=worldY+Math.sin(a)*dR; }
            
            let v=[]; let vc = (ty==='tn')?6:(ty==='ch')?3:(ty==='sp')?5:4;
            for(let j=0; j<vc; j++) v.push({a:(j/vc)*Math.PI*2, r:0.7+Math.random()*0.6});
            enemies.push({id: enemyIdCounter++, t:ty, isB:false, x:sx, y:sy, s:sz, sp:sp, hp:hp, mHp:hp, a:0, rS:(Math.random()-0.5)*0.05, kx:0, ky:0, damageFlash:0, c:col, kbR:kbR, aT:0, tA:0, dead: false, oS: false, v: v});
        }

    }
